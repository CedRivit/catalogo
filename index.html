<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIVIT S.p.A SB - Loading...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Sfondo nero durante il caricamento */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Schermata Intro */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('intro.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Overlay scuro per leggere meglio il testo */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
        }

        /* Spinner */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #e11d48; /* Rosso Rivit */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            display: inline-block;
        }

        .loading-text {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="overlay"></div>
        <div class="content">
            <div class="loader"></div>
            <div class="loading-text">Loading Document...</div>
        </div>
    </div>

    <script>
        // Nome del file PDF
        const pdfUrl = "RIVIT_Company Profile.pdf";

        // Funzione di caricamento
        window.onload = function() {
            // Pre-carichiamo il file in background
            const req = new XMLHttpRequest();
            req.open('GET', pdfUrl, true);
            req.responseType = 'blob';

            req.onload = function() {
                if (this.status === 200) {
                    // Se il file è stato scaricato con successo, vai al PDF
                    // Usiamo un piccolo ritardo per assicurarci che l'utente veda l'intro
                    setTimeout(() => {
                        window.location.href = pdfUrl;
                    }, 2000); 
                }
            };

            req.onerror = function() {
                // In caso di errore (es. offline), prova comunque ad aprire il file dopo 3 secondi
                setTimeout(() => {
                    window.location.href = pdfUrl;
                }, 3000);
            };

            req.send();
        };
    </script>

</body>
</html>
